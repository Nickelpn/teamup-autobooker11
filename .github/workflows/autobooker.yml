name: TeamUp Auto-Booker

on:
  schedule:
    - cron: "0 5 * * 1-5"
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Run auto-booker
        run: python teamup_autobooker.py
        env:
          TEAMUP_EMAIL: ${{ secrets.TEAMUP_EMAIL }}
          TEAMUP_PASSWORD: ${{ secrets.TEAMUP_PASSWORD }}
          TEAMUP_BUSINESS_SLUG: ${{ secrets.TEAMUP_BUSINESS_SLUG }}
